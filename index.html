<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项管理 | TaskFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#60A5FA',
                        accent: '#EF4444',
                        success: '#10B981',
                        warning: '#F59E0B',
                        info: '#3B82F6',
                        dark: '#1E293B',
                        light: '#F8FAFC'
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                        'elevated': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .task-complete {
                @apply line-through text-gray-400;
            }
            .gradient-bg {
                background: linear-gradient(135deg, #EFF6FF 0%, #FFFFFF 100%);
            }
            .gradient-primary {
                background: linear-gradient(135deg, #3B82F6 0%, #60A5FA 100%);
            }
            .priority-high {
                @apply border-l-4 border-accent;
            }
            .priority-medium {
                @apply border-l-4 border-warning;
            }
            .priority-low {
                @apply border-l-4 border-info;
            }
            .priority-none {
                @apply border-l-4 border-gray-300;
            }
            .slide-in {
                animation: slideIn 0.3s ease-out forwards;
            }
            .fade-in {
                animation: fadeIn 0.3s ease-out forwards;
            }
            .scale-in {
                animation: scaleIn 0.2s ease-out forwards;
            }
            .pulse-subtle {
                animation: pulseSubtle 2s infinite;
            }
            .task-highlight {
                animation: taskHighlight 3s ease-out;
            }
        }

        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        @keyframes pulseSubtle {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes taskHighlight {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
            20% { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5); }
            80% { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5); }
        }
    </style>
</head>
<body class="font-inter min-h-screen gradient-bg text-dark antialiased">
    <!-- 顶部通知条 -->
    <div id="toastNotification" class="fixed top-0 left-0 right-0 py-3 px-4 text-center text-white transform -translate-y-full opacity-0 transition-all duration-300 z-50"></div>

    <!-- 确认操作面板 -->
    <div id="confirmOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-elevated max-w-md w-full p-6 transform transition-all scale-95 opacity-0" id="confirmDialog">
            <h3 id="confirmTitle" class="text-lg font-semibold text-gray-800 mb-2"></h3>
            <p id="confirmMessage" class="text-gray-600 mb-6"></p>
            <div class="flex justify-end space-x-3">
                <button id="confirmCancel" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors">
                    取消
                </button>
                <button id="confirmOk" class="px-4 py-2 bg-accent text-white rounded-lg hover:bg-accent/90 transition-colors">
                    确认
                </button>
            </div>
        </div>
    </div>

    <header class="w-full py-6 px-4 md:px-8 bg-white/90 backdrop-blur-sm shadow-sm transition-all duration-300 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-[clamp(1.75rem,3vw,2.5rem)] font-bold text-gray-800 flex items-center">
                <i class="fa fa-check-square-o mr-3 text-primary text-3xl"></i>
                <span>TaskFlow</span>
                <span class="ml-2 text-sm font-normal text-gray-500 hidden sm:inline-block">高效待办事项管理</span>
            </h1>
        </div>
    </header>

    <main class="flex-grow w-full px-4 md:px-8 py-8">
        <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-card overflow-hidden transition-all duration-300 hover:shadow-card-hover">
            <!-- 导航标签 -->
            <div class="flex border-b">
                <button id="navTasks" class="nav-tab px-6 py-4 font-medium text-primary border-b-2 border-primary transition-all duration-200">
                    <i class="fa fa-list-ul mr-2"></i>任务管理
                </button>
                <button id="navTrash" class="nav-tab px-6 py-4 font-medium text-gray-500 hover:text-gray-700 transition-all duration-200">
                    <i class="fa fa-trash mr-2"></i>回收站
                </button>
            </div>

            <!-- 任务管理区域 -->
            <div id="tasksSection" class="flex flex-col md:flex-row">
                <!-- 左侧：添加/编辑任务区域 -->
                <div class="p-6 md:p-8 border-b md:border-b-0 md:border-r border-gray-100 w-full md:w-1/3 bg-gray-50">
                    <h2 id="formTitle" class="text-xl font-semibold text-gray-700 mb-6 flex items-center">
                        <i class="fa fa-plus-circle text-primary mr-2"></i>添加新任务
                    </h2>
                    <form id="taskForm" class="space-y-5">
                        <input type="hidden" id="taskId">
                        <div>
                            <label for="taskTitle" class="block text-sm font-medium text-gray-700 mb-1">任务标题 <span class="text-accent">*</span></label>
                            <input type="text" id="taskTitle" 
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
                                placeholder="输入任务标题..." required>
                        </div>
                        <div>
                            <label for="taskDescription" class="block text-sm font-medium text-gray-700 mb-1">任务描述</label>
                            <textarea id="taskDescription" rows="3" 
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
                                placeholder="输入任务描述..."></textarea>
                        </div>
                        <!-- 优先级选择 -->
                        <div>
                            <label for="taskPriority" class="block text-sm font-medium text-gray-700 mb-1">优先级</label>
                            <select id="taskPriority" 
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 bg-white">
                                <option value="none">无</option>
                                <option value="low">低</option>
                                <option value="medium">中</option>
                                <option value="high">高</option>
                            </select>
                        </div>
                        
                        <!-- 通知设置（字段名统一，彻底修复读取bug） -->
                        <div>
                            <label for="reminderMinutes" class="block text-sm font-medium text-gray-700 mb-1">提醒时间</label>
                            <select id="reminderMinutes" 
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 bg-white">
                                <option value="5">提前5分钟</option>
                                <option value="15">提前15分钟</option>
                                <option value="30">提前30分钟</option>
                                <option value="60">提前1小时</option>
                                <option value="1440">提前1天</option>
                                <option value="0">仅过期时提醒</option>
                                <option value="-1">不提醒</option>
                            </select>
                        </div>
                        <div>
                            <label for="taskDueDateTime" class="block text-sm font-medium text-gray-700 mb-1">截止日期时间 <span class="text-accent">*</span></label>
                            <input type="datetime-local" id="taskDueDateTime" 
                                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200"
                                required>
                            <p id="dateError" class="text-accent text-sm mt-1 hidden">截止日期时间不能早于当前时间</p>
                        </div>
                        <div class="flex space-x-3 pt-2">
                            <button type="button" id="submitTaskButton"
                                class="flex-1 gradient-primary hover:opacity-95 text-white font-medium py-2.5 px-4 rounded-lg transition-all duration-200 transform hover:scale-[1.02] flex items-center justify-center shadow-sm">
                                <i class="fa fa-plus mr-2"></i>添加任务
                            </button>
                            <button type="button" id="cancelEditButton" class="hidden px-4 py-2.5 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100 transition-all duration-200">
                                <i class="fa fa-times"></i>
                            </button>
                        </div>
                    </form>

                    <!-- 快速统计卡片 -->
                    <div class="mt-8 bg-white rounded-xl shadow-sm p-5 border border-gray-100 slide-in">
                        <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">任务概览</h3>
                        <div class="space-y-5">
                            <div>
                                <div class="flex justify-between text-sm mb-1.5">
                                    <span class="text-gray-600">完成进度</span>
                                    <span id="completionRate" class="font-medium">0%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                                    <div id="progressBar" class="bg-primary h-2.5 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                                </div>
                            </div>
                            <!-- 按优先级统计 -->
                            <div>
                                <p class="text-xs text-gray-500 mb-2.5">按优先级分布</p>
                                <div class="space-y-2.5">
                                    <div class="flex items-center">
                                        <span class="w-2.5 h-2.5 rounded-full bg-accent mr-2"></span>
                                        <span class="text-xs text-gray-600 flex-1">高优先级</span>
                                        <span id="highPriorityCount" class="text-xs font-medium">0</span>
                                    </div>
                                    <div class="flex items-center">
                                        <span class="w-2.5 h-2.5 rounded-full bg-warning mr-2"></span>
                                        <span class="text-xs text-gray-600 flex-1">中优先级</span>
                                        <span id="mediumPriorityCount" class="text-xs font-medium">0</span>
                                    </div>
                                    <div class="flex items-center">
                                        <span class="w-2.5 h-2.5 rounded-full bg-info mr-2"></span>
                                        <span class="text-xs text-gray-600 flex-1">低优先级</span>
                                        <span id="lowPriorityCount" class="text-xs font-medium">0</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧：任务列表区域 -->
                <div class="p-6 md:p-8 w-full md:w-2/3">
                    <div class="mb-6">
                        <h2 class="text-xl font-semibold text-gray-700 flex items-center mb-4">
                            <i class="fa fa-tasks text-primary mr-2"></i>任务列表
                        </h2>
                        
                        <!-- 搜索框 -->
                        <div class="relative mb-4">
                            <input type="text" id="searchInput" 
                                class="pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 w-full"
                                placeholder="搜索任务标题或描述...">
                            <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        </div>
                        
                        <!-- 过滤按钮 -->
                        <div class="flex flex-wrap gap-2">
                            <button id="filterAll" class="filter-btn px-3.5 py-1.5 rounded-md text-sm bg-primary text-white shadow-sm">全部</button>
                            <button id="filterActive" class="filter-btn px-3.5 py-1.5 rounded-md text-sm bg-gray-100 hover:bg-gray-200 transition-colors">未完成</button>
                            <button id="filterCompleted" class="filter-btn px-3.5 py-1.5 rounded-md text-sm bg-gray-100 hover:bg-gray-200 transition-colors">已完成</button>
                            <button id="clearCompleted" class="px-3.5 py-1.5 rounded-md text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors ml-auto">
                                <i class="fa fa-trash-o mr-1"></i>清空已完成
                            </button>
                        </div>
                    </div>

                    <!-- 任务列表 -->
                    <div id="taskList" class="space-y-3 max-h-[calc(100vh-350px)] overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-gray-200 scrollbar-track-transparent">
                        <!-- 任务项会通过JavaScript动态添加 -->
                        <div class="text-center text-gray-400 py-10" id="emptyTaskList">
                            <i class="fa fa-inbox text-4xl mb-3 block text-gray-300"></i>
                            <p>暂无任务，请添加新任务</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 回收站区域 -->
            <div id="trashSection" class="p-6 md:p-8 hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold text-gray-700 flex items-center">
                        <i class="fa fa-trash text-accent mr-2"></i>回收站
                    </h2>
                    <button id="emptyTrash" class="px-4 py-2 rounded-md text-sm text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors">
                        <i class="fa fa-fire mr-1"></i>清空回收站
                    </button>
                </div>

                <!-- 回收站说明 -->
                <div class="bg-amber-50 border-l-4 border-amber-400 p-4 mb-6 rounded">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <i class="fa fa-info-circle text-amber-500"></i>
                        </div>
                        <div class="ml-3">
                            <p class="text-sm text-amber-700">
                                已删除的任务将在回收站中保留30天，超过期限将被永久删除。
                            </p>
                        </div>
                    </div>
                </div>

                <!-- 回收站列表 -->
                <div id="trashList" class="space-y-3 max-h-[calc(100vh-300px)] overflow-y-auto pr-2 scrollbar-thin scrollbar-thumb-gray-200 scrollbar-track-transparent">
                    <!-- 回收站项会通过JavaScript动态添加 -->
                    <div class="text-center text-gray-400 py-10" id="emptyTrashList">
                        <i class="fa fa-trash-o text-4xl mb-3 block text-gray-300"></i>
                        <p>回收站是空的</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full py-4 px-4 md:px-8 bg-white/90 backdrop-blur-sm shadow-inner mt-8">
        <div class="max-w-6xl mx-auto text-center text-sm text-gray-500">
            <p>© TaskFlow | 高效管理您的待办事项</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 任务数据存储
            let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            let trash = JSON.parse(localStorage.getItem('trash')) || [];
            let currentFilter = 'all';
            let editingTaskId = null;
            let confirmCallback = null;
            let searchQuery = '';
            
            // ========== 核心修复：统一字段名，兼容旧数据，初始化提醒相关字段 ==========
            tasks = tasks.map(task => {
                return { 
                    ...task, 
                    // 统一字段：reminderMinutes 存储提醒分钟数，彻底解决字段混乱问题
                    reminderMinutes: task.reminderMinutes || task.notificationMinutes || task.notification || '5',
                    // 统一字段：reminderTime 存储提醒时间戳（毫秒）
                    reminderTime: task.reminderTime || '',
                    // 统一字段：hasReminded 是否已发送提醒
                    hasReminded: task.hasReminded || task.reminderTriggered || task.notified || false,
                    // 优先级兼容
                    priority: task.priority || 'none'
                };
            });
            
            // 回收站数据兼容
            trash = trash.map(item => {
                return { ...item, priority: item.priority || 'none' };
            });
            
            // 初始化保存数据
            saveData();

            // DOM元素缓存
            const elements = {
                taskForm: document.getElementById('taskForm'),
                taskList: document.getElementById('taskList'),
                trashList: document.getElementById('trashList'),
                emptyTaskList: document.getElementById('emptyTaskList'),
                emptyTrashList: document.getElementById('emptyTrashList'),
                completionRate: document.getElementById('completionRate'),
                progressBar: document.getElementById('progressBar'),
                highPriorityCount: document.getElementById('highPriorityCount'),
                mediumPriorityCount: document.getElementById('mediumPriorityCount'),
                lowPriorityCount: document.getElementById('lowPriorityCount'),
                filterButtons: document.querySelectorAll('.filter-btn'),
                submitTaskButton: document.getElementById('submitTaskButton'),
                cancelEditButton: document.getElementById('cancelEditButton'),
                formTitle: document.getElementById('formTitle'),
                taskDueDateTime: document.getElementById('taskDueDateTime'),
                dateError: document.getElementById('dateError'),
                navTasks: document.getElementById('navTasks'),
                navTrash: document.getElementById('navTrash'),
                tasksSection: document.getElementById('tasksSection'),
                trashSection: document.getElementById('trashSection'),
                clearCompleted: document.getElementById('clearCompleted'),
                emptyTrash: document.getElementById('emptyTrash'),
                toastNotification: document.getElementById('toastNotification'),
                confirmOverlay: document.getElementById('confirmOverlay'),
                confirmDialog: document.getElementById('confirmDialog'),
                confirmTitle: document.getElementById('confirmTitle'),
                confirmMessage: document.getElementById('confirmMessage'),
                confirmOk: document.getElementById('confirmOk'),
                confirmCancel: document.getElementById('confirmCancel'),
                taskTitleInput: document.getElementById('taskTitle'),
                taskDescription: document.getElementById('taskDescription'),
                taskPriority: document.getElementById('taskPriority'),
                reminderMinutes: document.getElementById('reminderMinutes'), // 统一字段
                taskId: document.getElementById('taskId'),
                searchInput: document.getElementById('searchInput')
            };

            // ========== 核心工具函数：时间计算相关 ==========
            // 格式化日期为input的datetime-local格式
            function formatDateTimeForInput(date) {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                return `${year}-${month}-${day}T${hours}:${minutes}`;
            }

            // 格式化日期为易读显示格式
            function formatDateTimeForDisplay(dateString) {
                if (!dateString) return '无';
                const date = new Date(dateString);
                return date.toLocaleString('zh-CN', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            // 【核心修复】计算任务的提醒时间戳（精准到毫秒）
            function calculateReminderTimestamp(dueDateTimeStr, reminderMinutes) {
                const dueDate = new Date(dueDateTimeStr);
                const mins = parseInt(reminderMinutes);
                
                // 不提醒的情况
                if (mins === -1) return 0;
                // 仅过期时提醒：提醒时间=截止时间
                if (mins === 0) return dueDate.getTime();
                // 提前N分钟提醒：提醒时间=截止时间 - N分钟
                return dueDate.getTime() - (mins * 60 * 1000);
            }

            // 计算任务剩余时间
            function calculateRemainingTime(dueDateTime, completed) {
                if (completed) return '已完成';
                
                const now = new Date();
                const dueDate = new Date(dueDateTime);
                const diffTime = dueDate - now;
                
                if (diffTime <= 0) {
                    const days = Math.floor(Math.abs(diffTime) / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((Math.abs(diffTime) % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((Math.abs(diffTime) % (1000 * 60 * 60)) / (1000 * 60));
                    
                    if (days > 0) return `${days}天${hours}小时前已过期`;
                    if (hours > 0) return `${hours}小时${minutes}分钟前已过期`;
                    return `${minutes}分钟前已过期`;
                } else {
                    const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
                    
                    if (days > 0) return `剩余 ${days}天${hours}小时`;
                    if (hours > 0) return `剩余 ${hours}小时${minutes}分钟`;
                    return `剩余 ${minutes}分钟`;
                }
            }

            // ========== 核心修复：提醒检查与发送逻辑 ==========
            // 【核心重写】检查所有任务的提醒状态，精准触发
            function checkTaskReminders() {
                const now = Date.now();
                // 窗口期：过去2分钟内的提醒，都触发（避免页面刷新/浏览器休眠漏提醒）
                const windowTime = 2 * 60 * 1000;
                let hasUpdated = false;

                console.log('===== 检查任务提醒 =====', new Date().toLocaleString());
                
                tasks.forEach((task, index) => {
                    // 已完成/不提醒/已发送过提醒 → 跳过
                    if (task.completed || task.reminderMinutes === '-1' || task.hasReminded) return;
                    
                    // 读取提醒时间戳，没有则重新计算
                    let reminderTimestamp = task.reminderTime ? parseInt(task.reminderTime) : calculateReminderTimestamp(task.dueDateTime, task.reminderMinutes);
                    
                    // 缓存提醒时间戳到任务对象
                    if (!task.reminderTime) {
                        tasks[index].reminderTime = reminderTimestamp.toString();
                        hasUpdated = true;
                    }

                    // 【核心逻辑】检查是否到达提醒时间（含窗口期容错）
                    const isTimeToRemind = (now >= reminderTimestamp) && (now - reminderTimestamp <= windowTime);
                    // 过期提醒单独处理（截止时间到了，且没提醒过）
                    const isOverdueNeedRemind = (task.reminderMinutes === '0') && (now >= new Date(task.dueDateTime).getTime()) && (now - new Date(task.dueDateTime).getTime() <= windowTime);

                    if (isTimeToRemind || isOverdueNeedRemind) {
                        console.log('触发提醒：', task.title, '提醒时间：', new Date(reminderTimestamp).toLocaleString());
                        // 发送通知
                        sendTaskNotification(task);
                        // 标记为已提醒，避免重复发送
                        tasks[index].hasReminded = true;
                        hasUpdated = true;
                    }
                });

                // 有更新则保存数据
                if (hasUpdated) saveData();
            }

            // 发送任务通知（桌面通知+Toast双提醒）
            function sendTaskNotification(task) {
                const reminderMins = parseInt(task.reminderMinutes);
                const dueDate = new Date(task.dueDateTime);
                const isOverdue = reminderMins === 0;
                let title, body;

                // 精准文案，明确提醒类型
                if (isOverdue) {
                    title = `⚠️ 任务已过期`;
                    body = `「${task.title}」已到截止时间（${formatDateTimeForDisplay(task.dueDateTime)}），请立即处理！`;
                } else if (reminderMins > 0) {
                    const unit = reminderMins >= 60 ? `${reminderMins/60}小时` : `${reminderMins}分钟`;
                    title = `⏰ 任务即将到期`;
                    body = `「${task.title}」将在${unit}后到期（截止时间：${formatDateTimeForDisplay(task.dueDateTime)}），请及时处理！`;
                } else {
                    return; // 不提醒
                }

                // ========== 1. 桌面通知处理 ==========
                if ('Notification' in window) {
                    // 无权限：先请求
                    if (Notification.permission !== 'granted') {
                        Notification.requestPermission().then(perm => {
                            if (perm === 'granted') showNativeNotification(title, body, task);
                        });
                    } else {
                        // 有权限：直接发送
                        showNativeNotification(title, body, task);
                    }
                }

                // ========== 2. 页面内Toast提醒（双保险，必显示） ==========
                showToast(body, isOverdue ? 'error' : 'warning');
            }

            // 显示原生桌面通知
            function showNativeNotification(title, body, task) {
                // 根据优先级设置图标颜色
                const iconColor = task.priority === 'high' ? '%23EF4444' : 
                                 task.priority === 'medium' ? '%23F59E0B' : '%233B82F6';
                
                const notification = new Notification(title, {
                    body: body,
                    icon: `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="${iconColor}"><path d="M9 11H7v6h2v-6zm4 0h-2v6h2v-6zm4 0h-2v6h2v-6zM9 3H7v2h2V3zm4 0h-2v2h2V3zm4 0h-2v2h2V3zM5 21h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2z"/></svg>`,
                    tag: task.id,
                    requireInteraction: parseInt(task.reminderMinutes) === 0, // 过期通知必须手动关闭
                    silent: false
                });
                
                // 点击通知：聚焦页面+定位+高亮任务
                notification.onclick = function() {
                    window.focus();
                    showSection('tasks');
                    
                    setTimeout(() => {
                        const taskElement = document.querySelector(`[data-task-id="${task.id}"]`);
                        if (taskElement) {
                            taskElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            taskElement.classList.add('task-highlight');
                            setTimeout(() => taskElement.classList.remove('task-highlight'), 3000);
                        }
                    }, 100);
                    notification.close();
                };
                
                // 【优化】非过期通知显示15秒后关闭，延长提醒时长
                if (parseInt(task.reminderMinutes) !== 0) {
                    setTimeout(() => notification.close(), 15000);
                }
            }

            // ========== 基础功能函数 ==========
            // 显示顶部Toast通知
            function showToast(message, type = 'info') {
                const toast = elements.toastNotification;
                toast.textContent = message;
                
                toast.className = 'fixed top-0 left-0 right-0 py-3 px-4 text-center text-white transform -translate-y-full opacity-0 transition-all duration-300 z-50';
                if (type === 'success') toast.classList.add('bg-success');
                else if (type === 'error') toast.classList.add('bg-accent');
                else if (type === 'warning') toast.classList.add('bg-warning');
                else toast.classList.add('bg-primary');
                
                setTimeout(() => toast.classList.remove('-translate-y-full', 'opacity-0'), 10);
                setTimeout(() => toast.classList.add('-translate-y-full', 'opacity-0'), 4000);
            }

            // 确认对话框
            function showConfirmDialog(title, message, callback) {
                elements.confirmTitle.textContent = title;
                elements.confirmMessage.textContent = message;
                confirmCallback = callback;
                
                elements.confirmOverlay.classList.remove('hidden');
                elements.confirmOverlay.classList.add('flex');
                setTimeout(() => {
                    elements.confirmDialog.classList.remove('scale-95', 'opacity-0');
                    elements.confirmDialog.classList.add('scale-100', 'opacity-100');
                }, 10);
            }

            // 隐藏确认对话框
            function hideConfirmDialog() {
                elements.confirmDialog.classList.remove('scale-100', 'opacity-100');
                elements.confirmDialog.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    elements.confirmOverlay.classList.add('hidden');
                    elements.confirmOverlay.classList.remove('flex');
                    confirmCallback = null;
                }, 300);
            }

            // 切换显示区域
            function showSection(section) {
                if (section === 'tasks') {
                    elements.tasksSection.classList.remove('hidden');
                    elements.trashSection.classList.add('hidden');
                    elements.navTasks.classList.add('text-primary', 'border-b-2', 'border-primary');
                    elements.navTasks.classList.remove('text-gray-500', 'hover:text-gray-700');
                    elements.navTrash.classList.remove('text-primary', 'border-b-2', 'border-primary');
                    elements.navTrash.classList.add('text-gray-500', 'hover:text-gray-700');
                } else {
                    elements.tasksSection.classList.add('hidden');
                    elements.trashSection.classList.remove('hidden');
                    elements.navTrash.classList.add('text-primary', 'border-b-2', 'border-primary');
                    elements.navTrash.classList.remove('text-gray-500', 'hover:text-gray-700');
                    elements.navTasks.classList.remove('text-primary', 'border-b-2', 'border-primary');
                    elements.navTasks.classList.add('text-gray-500', 'hover:text-gray-700');
                }
            }

            // 清理过期回收站项目
            function cleanupOldTrashItems() {
                const thirtyDaysAgo = new Date();
                thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
                const oldItemsCount = trash.filter(item => new Date(item.deletedAt) < thirtyDaysAgo).length;
                trash = trash.filter(item => new Date(item.deletedAt) >= thirtyDaysAgo);
                
                if (oldItemsCount > 0) {
                    saveData();
                    renderTrash();
                    showToast(`已自动清理 ${oldItemsCount} 个超过30天的回收站项目`, 'info');
                }
            }

            // 验证截止日期
            function validateDueDate() {
                const dueDate = new Date(elements.taskDueDateTime.value);
                const now = new Date();
                now.setSeconds(0, 0);
                dueDate.setSeconds(0, 0);
                
                if (dueDate < now) {
                    elements.taskDueDateTime.classList.add('border-accent', 'focus:ring-accent/50', 'focus:border-accent');
                    elements.dateError.classList.remove('hidden');
                    return false;
                } else {
                    elements.taskDueDateTime.classList.remove('border-accent', 'focus:ring-accent/50', 'focus:border-accent');
                    elements.dateError.classList.add('hidden');
                    return true;
                }
            }

            // 设置任务过滤器
            function setFilter(filter) {
                currentFilter = filter;
                elements.filterButtons.forEach(btn => {
                    btn.classList.remove('bg-primary', 'text-white', 'shadow-sm');
                    btn.classList.add('bg-gray-100', 'hover:bg-gray-200');
                });
                
                const activeBtn = document.getElementById(`filter${filter.charAt(0).toUpperCase() + filter.slice(1)}`);
                activeBtn.classList.remove('bg-gray-100', 'hover:bg-gray-200');
                activeBtn.classList.add('bg-primary', 'text-white', 'shadow-sm');
                
                renderTasks();
            }

            // 保存数据到本地存储
            function saveData() {
                localStorage.setItem('tasks', JSON.stringify(tasks));
                localStorage.setItem('trash', JSON.stringify(trash));
            }

            // 更新任务统计
            function updateTaskStats() {
                const total = tasks.length;
                const completed = tasks.filter(task => task.completed).length;
                const completionRate = total > 0 ? Math.round((completed / total) * 100) : 0;
                
                elements.completionRate.textContent = `${completionRate}%`;
                elements.progressBar.style.width = `${completionRate}%`;
                
                const highPriority = tasks.filter(task => !task.completed && task.priority === 'high').length;
                const mediumPriority = tasks.filter(task => !task.completed && task.priority === 'medium').length;
                const lowPriority = tasks.filter(task => !task.completed && task.priority === 'low').length;
                
                elements.highPriorityCount.textContent = highPriority;
                elements.mediumPriorityCount.textContent = mediumPriority;
                elements.lowPriorityCount.textContent = lowPriority;
            }

            // 更新所有任务的剩余时间显示
            function updateRemainingTimes() {
                document.querySelectorAll('.remaining-time').forEach(el => {
                    const taskId = el.getAttribute('data-task-id');
                    const task = tasks.find(t => t.id === taskId);
                    if (!task) return;
                    
                    const remainingTime = calculateRemainingTime(task.dueDateTime, task.completed);
                    el.textContent = remainingTime;
                    
                    if (remainingTime.includes('已过期')) {
                        el.classList.add('text-accent');
                        el.classList.remove('text-success', 'text-gray-600');
                    } else if (task.completed) {
                        el.classList.add('text-success');
                        el.classList.remove('text-accent', 'text-gray-600');
                    } else {
                        el.classList.add('text-gray-600');
                        el.classList.remove('text-accent', 'text-success');
                    }
                });
            }

            // 计算回收站剩余保留天数
            function getDaysRemaining(deletedAt) {
                const deletedDate = new Date(deletedAt);
                const expiryDate = new Date(deletedDate);
                expiryDate.setDate(expiryDate.getDate() + 30);
                const diffTime = expiryDate - Date.now();
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return diffDays > 0 ? diffDays : 0;
            }

            // ========== 核心业务逻辑：任务增删改查 ==========
            // 添加新任务
            function addTask() {
                const title = elements.taskTitleInput.value.trim();
                const description = elements.taskDescription.value.trim();
                const dueDateTime = elements.taskDueDateTime.value;
                const priority = elements.taskPriority.value;
                const reminderMinutes = elements.reminderMinutes.value; // 统一读取
                
                if (!title) {
                    elements.taskTitleInput.classList.add('border-accent', 'focus:ring-accent/50', 'focus:border-accent');
                    setTimeout(() => elements.taskTitleInput.classList.remove('border-accent', 'focus:ring-accent/50', 'focus:border-accent'), 2000);
                    return;
                }
                if (!validateDueDate()) return;
                
                // 计算提醒时间戳
                const reminderTime = calculateReminderTimestamp(dueDateTime, reminderMinutes).toString();
                
                const newTask = {
                    id: Date.now().toString(),
                    title,
                    description,
                    priority,
                    dueDateTime,
                    reminderMinutes, // 统一存储
                    reminderTime, // 存储提醒时间戳
                    hasReminded: false, // 初始化未提醒
                    completed: false,
                    createdAt: new Date().toISOString()
                };
                
                tasks.unshift(newTask);
                saveData();
                renderTasks();
                updateTaskStats();
                
                // 重置表单
                elements.taskForm.reset();
                const defaultDueDate = new Date();
                defaultDueDate.setMinutes(defaultDueDate.getMinutes() + 30);
                elements.taskDueDateTime.value = formatDateTimeForInput(defaultDueDate);
                elements.taskPriority.value = 'none';
                elements.reminderMinutes.value = '5'; // 重置提醒时间
                
                showToast('任务添加成功', 'success');
                console.log('新任务添加：', newTask);
            }

            // 编辑任务
            function editTask(taskId) {
                const task = tasks.find(task => task.id === taskId);
                if (!task) return;
                
                editingTaskId = taskId;
                
                // 填充表单（含提醒时间回显）
                elements.taskId.value = task.id;
                elements.taskTitleInput.value = task.title;
                elements.taskDescription.value = task.description;
                elements.taskPriority.value = task.priority || 'none';
                elements.taskDueDateTime.value = formatDateTimeForInput(new Date(task.dueDateTime));
                elements.reminderMinutes.value = task.reminderMinutes || '5'; // 回显提醒时间
                
                // 更改表单状态
                elements.formTitle.innerHTML = '<i class="fa fa-pencil text-primary mr-2"></i>编辑任务';
                elements.submitTaskButton.innerHTML = '<i class="fa fa-save mr-2"></i>保存任务';
                elements.cancelEditButton.classList.remove('hidden');
                
                if (window.innerWidth < 768) {
                    elements.formTitle.scrollIntoView({ behavior: 'smooth' });
                }
            }

            // 更新任务
            function updateTask() {
                const taskId = elements.taskId.value;
                const title = elements.taskTitleInput.value.trim();
                const description = elements.taskDescription.value.trim();
                const dueDateTime = elements.taskDueDateTime.value;
                const priority = elements.taskPriority.value;
                const reminderMinutes = elements.reminderMinutes.value; // 读取编辑后的提醒时间
                
                if (!title || !taskId) {
                    if (!title) {
                        elements.taskTitleInput.classList.add('border-accent', 'focus:ring-accent/50', 'focus:border-accent');
                        setTimeout(() => elements.taskTitleInput.classList.remove('border-accent', 'focus:ring-accent/50', 'focus:border-accent'), 2000);
                    }
                    return;
                }
                if (!validateDueDate()) return;
                
                // 重新计算提醒时间戳，重置提醒状态
                const reminderTime = calculateReminderTimestamp(dueDateTime, reminderMinutes).toString();
                
                tasks = tasks.map(task => {
                    if (task.id === taskId) {
                        return { 
                            ...task, 
                            title, 
                            description, 
                            priority, 
                            dueDateTime,
                            reminderMinutes,
                            reminderTime,
                            hasReminded: false // 编辑后重置提醒状态
                        };
                    }
                    return task;
                });
                
                saveData();
                renderTasks();
                updateTaskStats();
                cancelEdit();
                
                showToast('任务更新成功', 'success');
                console.log('任务已更新：', tasks.find(t => t.id === taskId));
            }

            // 取消编辑
            function cancelEdit() {
                editingTaskId = null;
                elements.taskForm.reset();
                
                // 重置表单
                const defaultDueDate = new Date();
                defaultDueDate.setMinutes(defaultDueDate.getMinutes() + 30);
                elements.taskDueDateTime.value = formatDateTimeForInput(defaultDueDate);
                elements.taskPriority.value = 'none';
                elements.reminderMinutes.value = '5';
                
                // 恢复表单状态
                elements.formTitle.innerHTML = '<i class="fa fa-plus-circle text-primary mr-2"></i>添加新任务';
                elements.submitTaskButton.innerHTML = '<i class="fa fa-plus mr-2"></i>添加任务';
                elements.cancelEditButton.classList.add('hidden');
            }

            // 切换任务完成状态
            function toggleTaskStatus(taskId) {
                tasks = tasks.map(task => {
                    if (task.id === taskId) {
                        const updatedTask = { 
                            ...task, 
                            completed: !task.completed,
                            // 完成任务：标记为已提醒，避免后续再发通知
                            hasReminded: !task.completed ? true : task.hasReminded,
                            // 取消完成：重置提醒状态，重新检查
                            reminderTime: !task.completed ? task.reminderTime : calculateReminderTimestamp(task.dueDateTime, task.reminderMinutes).toString()
                        };
                        showToast(updatedTask.completed ? '任务已标记为完成' : '任务已标记为未完成', 'success');
                        return updatedTask;
                    }
                    return task;
                });
                
                saveData();
                renderTasks();
                updateTaskStats();
            }

            // 删除任务（移至回收站）
            function deleteTask(taskId) {
                showConfirmDialog(
                    '确认删除',
                    '确定要将此任务移至回收站吗？',
                    (confirmed) => {
                        if (confirmed) {
                            const taskIndex = tasks.findIndex(task => task.id === taskId);
                            if (taskIndex === -1) return;
                            
                            const [task] = tasks.splice(taskIndex, 1);
                            trash.push({ ...task, deletedAt: new Date().toISOString() });
                            
                            saveData();
                            renderTasks();
                            renderTrash();
                            updateTaskStats();
                            showToast('任务已移至回收站', 'info');
                        }
                    }
                );
            }

            // 从回收站恢复任务
            function restoreFromTrash(taskId) {
                const trashIndex = trash.findIndex(item => item.id === taskId);
                if (trashIndex === -1) return;
                
                const [item] = trash.splice(trashIndex, 1);
                const { deletedAt, ...taskToRestore } = item;
                
                // 恢复时重置提醒状态，重新计算提醒时间
                taskToRestore.hasReminded = false;
                taskToRestore.reminderTime = calculateReminderTimestamp(taskToRestore.dueDateTime, taskToRestore.reminderMinutes).toString();
                
                tasks.unshift(taskToRestore);
                saveData();
                renderTasks();
                renderTrash();
                updateTaskStats();
                showToast('任务已恢复', 'success');
            }

            // 永久删除回收站任务
            function permanentlyDelete(taskId) {
                showConfirmDialog(
                    '永久删除',
                    '确定要永久删除此任务吗？此操作无法撤销。',
                    (confirmed) => {
                        if (confirmed) {
                            trash = trash.filter(item => item.id !== taskId);
                            saveData();
                            renderTrash();
                            showToast('任务已永久删除', 'info');
                        }
                    }
                );
            }

            // 清空已完成任务
            function handleClearCompleted() {
                const completedCount = tasks.filter(task => task.completed).length;
                if (completedCount === 0) {
                    showToast('没有已完成的任务可清空', 'info');
                    return;
                }
                
                showConfirmDialog(
                    '清空已完成任务',
                    `确定要删除所有${completedCount}个已完成的任务吗？它们将被移至回收站。`,
                    (confirmed) => {
                        if (confirmed) {
                            const completedTasks = tasks.filter(task => task.completed);
                            const tasksToTrash = completedTasks.map(task => ({
                                ...task,
                                deletedAt: new Date().toISOString()
                            }));
                            
                            trash = [...trash, ...tasksToTrash];
                            tasks = tasks.filter(task => !task.completed);
                            
                            saveData();
                            renderTasks();
                            renderTrash();
                            updateTaskStats();
                            showToast('已完成任务已移至回收站', 'success');
                        }
                    }
                );
            }

            // 清空回收站
            function handleEmptyTrash() {
                if (trash.length === 0) {
                    showToast('回收站已经是空的', 'info');
                    return;
                }
                
                showConfirmDialog(
                    '清空回收站',
                    `确定要永久删除回收站中的所有${trash.length}个项目吗？此操作无法撤销。`,
                    (confirmed) => {
                        if (confirmed) {
                            trash = [];
                            saveData();
                            renderTrash();
                            showToast('回收站已清空', 'success');
                        }
                    }
                );
            }

            // ========== 渲染函数 ==========
            // 渲染任务列表
            function renderTasks() {
                let filteredTasks = [...tasks];
                
                // 搜索过滤
                if (searchQuery) {
                    filteredTasks = filteredTasks.filter(task => 
                        task.title.toLowerCase().includes(searchQuery) || 
                        (task.description && task.description.toLowerCase().includes(searchQuery))
                    );
                }
                
                // 状态过滤
                if (currentFilter === 'active') {
                    filteredTasks = filteredTasks.filter(task => !task.completed);
                } else if (currentFilter === 'completed') {
                    filteredTasks = filteredTasks.filter(task => task.completed);
                }
                
                // 排序：优先级从高到低，截止时间从近到远
                filteredTasks.sort((a, b) => {
                    const priorityOrder = { 'high': 4, 'medium': 3, 'low': 2, 'none': 1 };
                    if (priorityOrder[a.priority] !== priorityOrder[b.priority]) {
                        return priorityOrder[b.priority] - priorityOrder[a.priority];
                    }
                    return new Date(a.dueDateTime) - new Date(b.dueDateTime);
                });
                
                // 清空列表
                elements.taskList.innerHTML = '';
                
                // 空状态
                if (filteredTasks.length === 0) {
                    elements.taskList.appendChild(elements.emptyTaskList);
                    return;
                }
                
                // 渲染任务项
                filteredTasks.forEach((task, index) => {
                    const taskElement = document.createElement('div');
                    const delay = index * 50;
                    
                    taskElement.className = `task-item p-4 bg-white rounded-xl shadow-sm transition-all duration-300 hover:shadow-md fade-in`;
                    taskElement.style.animationDelay = `${delay}ms`;
                    taskElement.setAttribute('data-task-id', task.id);
                    
                    // 优先级边框
                    if (task.completed) {
                        taskElement.classList.add('border-l-4', 'border-success');
                    } else if (task.priority === 'high') {
                        taskElement.classList.add('priority-high');
                    } else if (task.priority === 'medium') {
                        taskElement.classList.add('priority-medium');
                    } else if (task.priority === 'low') {
                        taskElement.classList.add('priority-low');
                    } else {
                        taskElement.classList.add('priority-none');
                    }
                    
                    const remainingTime = calculateRemainingTime(task.dueDateTime, task.completed);
                    // 提醒时间显示文案
                    const reminderText = task.reminderMinutes === '-1' ? '不提醒' : task.reminderMinutes === '0' ? '仅过期时提醒' : `提前${task.reminderMinutes >= 60 ? task.reminderMinutes/60 + '小时' : task.reminderMinutes + '分钟'}`;
                    
                    taskElement.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-start">
                                    <input type="checkbox" id="task-${task.id}" ${task.completed ? 'checked' : ''} 
                                        class="mt-1 h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded cursor-pointer transition-colors">
                                    <label for="task-${task.id}" class="ml-3 block text-sm font-medium text-gray-700 ${task.completed ? 'task-complete' : ''}">
                                        ${task.title}
                                        ${task.priority !== 'none' && !task.completed ? 
                                            `<span class="ml-2 px-2 py-0.5 text-xs rounded-full font-medium 
                                                ${task.priority === 'high' ? 'bg-accent bg-opacity-10 text-accent' : 
                                                  task.priority === 'medium' ? 'bg-warning bg-opacity-10 text-warning' : 
                                                  'bg-info bg-opacity-10 text-info'}">
                                                ${task.priority === 'high' ? '高' : task.priority === 'medium' ? '中' : '低'}优先级
                                            </span>` : ''}
                                    </label>
                                </div>
                                ${task.description ? `
                                    <p class="mt-1 text-sm text-gray-500 ${task.completed ? 'task-complete' : ''} line-clamp-2">
                                        ${task.description}
                                    </p>
                                ` : ''}
                                <div class="mt-2 flex flex-wrap items-center gap-x-4 gap-y-1 text-xs">
                                    <span class="flex items-center">
                                        <i class="fa fa-calendar mr-1 ${task.completed ? 'text-gray-400' : 'text-primary'}"></i>
                                        截止: ${formatDateTimeForDisplay(task.dueDateTime)}
                                    </span>
                                    <span class="flex items-center">
                                        <i class="fa fa-bell mr-1 ${task.completed ? 'text-gray-400' : 'text-primary'}"></i>
                                        提醒: ${reminderText}
                                    </span>
                                    <span class="flex items-center remaining-time ${remainingTime.includes('已过期') ? 'text-accent' : task.completed ? 'text-success' : 'text-gray-600'}" data-task-id="${task.id}">
                                        <i class="fa fa-clock-o mr-1"></i>
                                        ${remainingTime}
                                    </span>
                                </div>
                            </div>
                            <div class="ml-4 flex-shrink-0 flex space-x-2">
                                <button class="edit-task-btn text-gray-400 hover:text-primary focus:outline-none transition-colors" data-task-id="${task.id}">
                                    <span class="sr-only">编辑任务</span>
                                    <i class="fa fa-pencil text-lg"></i>
                                </button>
                                <button class="delete-task-btn text-gray-400 hover:text-accent focus:outline-none transition-colors" data-task-id="${task.id}">
                                    <span class="sr-only">删除任务</span>
                                    <i class="fa fa-trash-o text-lg"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    
                    // 绑定事件
                    taskElement.querySelector(`#task-${task.id}`).addEventListener('change', () => toggleTaskStatus(task.id));
                    taskElement.querySelector('.edit-task-btn').addEventListener('click', () => editTask(task.id));
                    taskElement.querySelector('.delete-task-btn').addEventListener('click', () => deleteTask(task.id));
                    
                    elements.taskList.appendChild(taskElement);
                });
            }

            // 渲染回收站列表
            function renderTrash() {
                elements.trashList.innerHTML = '';
                
                if (trash.length === 0) {
                    elements.trashList.appendChild(elements.emptyTrashList);
                    return;
                }
                
                const sortedTrash = [...trash].sort((a, b) => new Date(b.deletedAt) - new Date(a.deletedAt));
                
                sortedTrash.forEach((item, index) => {
                    const daysRemaining = getDaysRemaining(item.deletedAt);
                    const trashItem = document.createElement('div');
                    const delay = index * 50;
                    
                    trashItem.className = 'p-4 bg-white rounded-xl shadow-sm border-l-4 border-gray-300 transition-all duration-300 hover:shadow-md slide-in';
                    trashItem.style.animationDelay = `${delay}ms`;
                    
                    const reminderText = item.reminderMinutes === '-1' ? '不提醒' : item.reminderMinutes === '0' ? '仅过期时提醒' : `提前${item.reminderMinutes >= 60 ? item.reminderMinutes/60 + '小时' : item.reminderMinutes + '分钟'}`;
                    
                    trashItem.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-start">
                                    <label class="block text-sm font-medium text-gray-600 ${item.completed ? 'task-complete' : ''}">
                                        ${item.title}
                                        ${item.priority !== 'none' ? 
                                            `<span class="ml-2 px-2 py-0.5 text-xs rounded-full font-medium 
                                                ${item.priority === 'high' ? 'bg-accent bg-opacity-10 text-accent' : 
                                                  item.priority === 'medium' ? 'bg-warning bg-opacity-10 text-warning' : 
                                                  'bg-info bg-opacity-10 text-info'}">
                                                ${item.priority === 'high' ? '高' : item.priority === 'medium' ? '中' : '低'}优先级
                                            </span>` : ''}
                                    </label>
                                </div>
                                ${item.description ? `
                                    <p class="mt-1 text-sm text-gray-500 ${item.completed ? 'task-complete' : ''} line-clamp-2">
                                        ${item.description}
                                    </p>
                                ` : ''}
                                <div class="mt-2 flex flex-wrap items-center gap-x-4 gap-y-1 text-xs">
                                    <span class="flex items-center text-gray-500">
                                        <i class="fa fa-calendar mr-1"></i>
                                        截止: ${formatDateTimeForDisplay(item.dueDateTime)}
                                    </span>
                                    <span class="flex items-center text-gray-500">
                                        <i class="fa fa-bell mr-1"></i>
                                        提醒: ${reminderText}
                                    </span>
                                    <span class="flex items-center text-gray-500">
                                        <i class="fa fa-trash-o mr-1"></i>
                                        删除: ${formatDateTimeForDisplay(item.deletedAt)}
                                    </span>
                                    <span class="flex items-center ${daysRemaining <= 3 ? 'text-accent pulse-subtle' : 'text-gray-500'}">
                                        <i class="fa fa-clock-o mr-1"></i>
                                        ${daysRemaining} 天后永久删除
                                    </span>
                                </div>
                            </div>
                            <div class="ml-4 flex-shrink-0 flex space-x-2">
                                <button class="restore-task-btn text-gray-400 hover:text-primary focus:outline-none transition-colors" data-task-id="${item.id}">
                                    <span class="sr-only">恢复任务</span>
                                    <i class="fa fa-undo text-lg"></i>
                                </button>
                                <button class="permanent-delete-btn text-gray-400 hover:text-accent focus:outline-none transition-colors" data-task-id="${item.id}">
                                    <span class="sr-only">永久删除</span>
                                    <i class="fa fa-times text-lg"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    
                    trashItem.querySelector('.restore-task-btn').addEventListener('click', () => restoreFromTrash(item.id));
                    trashItem.querySelector('.permanent-delete-btn').addEventListener('click', () => permanentlyDelete(item.id));
                    
                    elements.trashList.appendChild(trashItem);
                });
            }

            // ========== 事件绑定 ==========
            function bindEvents() {
                // 过滤按钮
                document.getElementById('filterAll').addEventListener('click', () => setFilter('all'));
                document.getElementById('filterActive').addEventListener('click', () => setFilter('active'));
                document.getElementById('filterCompleted').addEventListener('click', () => setFilter('completed'));
                
                // 提交/取消按钮
                elements.submitTaskButton.addEventListener('click', () => editingTaskId ? updateTask() : addTask());
                elements.cancelEditButton.addEventListener('click', cancelEdit);
                
                // 导航切换
                elements.navTasks.addEventListener('click', () => showSection('tasks'));
                elements.navTrash.addEventListener('click', () => showSection('trash'));
                
                // 清空按钮
                elements.clearCompleted.addEventListener('click', handleClearCompleted);
                elements.emptyTrash.addEventListener('click', handleEmptyTrash);
                
                // 日期验证
                elements.taskDueDateTime.addEventListener('change', validateDueDate);
                
                // 搜索功能
                elements.searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value.trim().toLowerCase();
                    renderTasks();
                });
                
                // 回车提交
                elements.taskForm.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        editingTaskId ? updateTask() : addTask();
                    }
                });
                
                // 确认对话框
                elements.confirmOk.addEventListener('click', () => {
                    hideConfirmDialog();
                    if (typeof confirmCallback === 'function') confirmCallback(true);
                });
                elements.confirmCancel.addEventListener('click', () => {
                    hideConfirmDialog();
                    if (typeof confirmCallback === 'function') confirmCallback(false);
                });

                // 【防漏提醒】标签页激活时，立即检查一次提醒
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) checkTaskReminders();
                });

                // 【防漏提醒】窗口聚焦时，立即检查一次提醒
                window.addEventListener('focus', () => checkTaskReminders());
            }

            // ========== 应用初始化 ==========
            function initApp() {
                // 清理过期回收站项目
                cleanupOldTrashItems();
                
                // 设置默认截止时间
                const now = new Date();
                const defaultDueDate = new Date(now);
                defaultDueDate.setMinutes(now.getMinutes() + 30);
                elements.taskDueDateTime.value = formatDateTimeForInput(defaultDueDate);
                elements.taskDueDateTime.min = formatDateTimeForInput(now);
                
                // 绑定事件
                bindEvents();
                
                // 渲染界面
                renderTasks();
                renderTrash();
                updateTaskStats();
                
                // 定时更新剩余时间
                setInterval(updateRemainingTimes, 60000);
                
                // 【核心优化】通知权限请求
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission().then(permission => {
                        if (permission === 'granted') {
                            showToast('已开启任务到期通知提醒', 'success');
                        }
                    });
                }
                
                // 【核心优化】提醒检查：每15秒检查一次，减少误差
                setInterval(checkTaskReminders, 15000);
                // 初始化立即检查一次
                checkTaskReminders();

                console.log('TaskFlow 应用初始化完成，提醒功能已启动');
            }

            // 启动应用
            initApp();
        });
    </script>

</body>
</html>
